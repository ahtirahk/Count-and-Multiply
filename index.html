<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Counter App</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f4f4f4;
      }
      h1 { font-size: 6rem; margin: 0 0 8px; color: #1a1a2e; }
      #max-msg { color: red; font-size: 14px; height: 20px; }
      #click-count { color: #185FA5; font-size: 18px; margin-bottom: 16px; }
      .btn-row { display: flex; gap: 12px; }
      button {
        width: 60px; height: 60px; font-size: 24px;
        border-radius: 50%; border: 2px solid #ccc;
        background: white; cursor: pointer;
      }
      #btn-x2 {
        width: auto; padding: 0 20px;
        border-radius: 30px; font-size: 16px;
        background: #e6f4e6;
      }
      #reset {
        margin-top: 16px; width: auto; height: auto;
        border-radius: 8px; font-size: 14px;
        padding: 8px 20px; border: 1px solid #ccc;
        background: white; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <h1 id="display">0</h1>
    <p id="max-msg"></p>
    <p id="click-count">total clicks: 0</p>

    <div class="btn-row">
      <button onclick="change(-1)">−</button>
      <button onclick="change(1)">+</button>
      <button id="btn-x2" onclick="multiply()">× 2</button>
    </div>

    <button id="reset" onclick="reset()">reset</button>

    <script>
      let count = 0;
      let totalClicks = 0;

      function change(amount) {
        // check BEFORE adding — if already at 10, block the + and show popup
        if (count >= 10 && amount > 0) {
          alert("Max limit reached! The maximum number is 10.");
          return; // stops the function here, count does not change
        }
      
        count = count + amount;
        totalClicks = totalClicks + 1;
        document.getElementById("click-count").textContent = "total clicks: " + totalClicks;
        updateDisplay();
      }

      // Challenge 1: multiply by 2
      function multiply() {
        count = count * 2;             // no cap — 6 × 2 = 12 now works
        totalClicks = totalClicks + 1;
        document.getElementById("click-count").textContent = "total clicks: " + totalClicks;
        updateDisplay();
      }

      function reset() {
        count = 0;
        totalClicks = 0;
        document.getElementById("max-msg").textContent = "";
        document.getElementById("click-count").textContent = "total clicks: 0";
        updateDisplay();
      }

      function updateDisplay() {
        document.getElementById("display").textContent = count;
      }
    </script>

  </body>
</html>
